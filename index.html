<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CMS - Members</title>
    <!-- Bootstrap CSS for the dropdown menu -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>CLUB MANAGEMENT SYSTEM</h1>
    </header>

    <!-- Navbar with Bootstrap Dropdown -->
    <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
        <div class="container-fluid justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        Management
                    </a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="index.html">Members</a></li>
                        <li><a class="dropdown-item" href="events.html">Events</a></li>
                        <li><a class="dropdown-item" href="attendance.html">Attendance</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>

    <section id="members">
        <h2>Members</h2>
        <div class="card">
            <form id="memberForm">
                <div class="form-row">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Gaurav Mundra" required>
                </div>
                <div class="form-row">
                    <label for="reg">Registration No</label>
                    <input type="text" id="reg" placeholder="24BCE2484 " pattern="2[0-9][A-Z]{3}[0-9]{4}" required>
                </div>
                <div class="form-row">
                    <label for="role">Role</label>
                    <input type="text" id="role" placeholder="Development Head" required>
                </div>
                <div class="form-row">
                    <label for="contact">Contact</label>
                    <input type="tel" id="contact" placeholder="9156428728" pattern="[6-9]{1}[0-9]{9}" required>
                </div>
                <button type="submit">Add Member</button>
            </form>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Reg No</th>
                        <th>Role</th>
                        <th>Contact</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="memberTable"></tbody>
            </table>
        </div>
    </section>

    <footer>
        <p>© 2026 IEEE - TEMS Club Management System done by:</p>
        <p>Gaurav - 24BCE2484</p>
    </footer>

    <!-- Bootstrap JS for Dropdown functionality -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
