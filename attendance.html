<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CMS - Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>CLUB MANAGEMENT SYSTEM</h1>
    </header>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Management</a>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="index.html">Members</a></li>
                        <li><a class="dropdown-item" href="events.html">Events</a></li>
                        <li><a class="dropdown-item" href="attendance.html">Attendance</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </nav>

    <section id="attendance">
        <h2>Attendance</h2>
        <div class="card">
            <div class="form-row">
                <label>Select Event</label>
                <select id="eventSelect" onchange="loadAttendance()"></select>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="attendanceTable"></tbody>
            </table>
            <button onclick="saveAttendance()" style="margin-top: 20px;">Save Attendance</button>
            <div id="summary"></div>
        </div>
    </section>

    <footer>
        <p>© 2026 IEEE - TEMS Club Management System done by: GAURAV MUNDRA - 24BCE2484</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
